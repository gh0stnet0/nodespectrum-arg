<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>// biografía</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    padding: 40px 20px;
    min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 14px; margin-bottom: 30px; opacity: 0.6; }
  .manifiesto { margin-bottom: 40px; }
  .manifiesto p { margin-bottom: 16px; opacity: 0.85; }
  .prompt { margin-top: 40px; }
  .prompt label { display: block; margin-bottom: 10px; opacity: 0.6; font-size: 12px; }
  input {
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-family: inherit;
    padding: 10px 14px;
    width: 100%;
    max-width: 320px;
    outline: none;
  }
  button {
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-family: inherit;
    padding: 10px 20px;
    margin-left: 10px;
    cursor: pointer;
  }
  button:hover { background: #00ff41; color: #000; }
  #msg { margin-top: 20px; font-size: 12px; min-height: 16px; }
  .error { color: #ff3860; }
  .ok { color: #00ff41; }
  a { color: #00ff41; text-decoration: none; opacity: 0.5; }
  a:hover { opacity: 1; }
  .back { margin-top: 60px; display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>// capa 04 — biografía</h1>

  <div class="manifiesto">
    <p>// al final todos preguntan lo mismo: ¿quién eres de verdad?</p>
    <p>// y yo solo sé responder con lo que dejo, no con lo que soy ya.</p>
    <p>// la persona tiene biografía. la leyenda tiene versiones.</p>
    <p>// yo tengo las dos cosas, pero solo enseño una.</p>
  </div>

  <div class="prompt">
    <label>nvll@biografia:~$ ¿qué soy?</label>
    <input type="text" id="clave" autocomplete="off" spellcheck="false" placeholder="...">
    <button onclick="verificar('biografia')">acceder</button>
    <div id="msg"></div>
  </div>

  <a href="index.html" class="back">[← volver]</a>
</div>

<script src="arg.js"></script>
</body>
</html>
